name: Testing & Production Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    # Permissions required to publish packages to GHCR
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: 123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm i -g pnpm
          # We use an environment variable to bypass the security check 
          # instead of a command-line flag that might be "unknown"
          pnpm approve-builds @firebase/util@1.15.0 @prisma/engines@7.7.0 bcrypt@6.0.0 bufferutil@4.1.0 esbuild@0.27.7 prisma@7.7.0 protobufjs@7.5.4 utf-8-validate@6.0.6
          pnpm i --no-frozen-lockfile
        env:
          PNPM_CONFIG_ONLY_BUILT_DEPENDENCIES_NONE: true

      - name: Run Database Migrations and Generation
        run: |
          # We generate the prisma client so the build doesn't fail
          pnpm run prisma:generate
        env:
          DATABASE_URL: 'postgresql://postgres:123@postgres:5432/postgres'
          DATABASE_DIRECT_URL: 'postgresql://postgres:123@postgres:5432/postgres'
          PNPM_CONFIG_ONLY_BUILT_DEPENDENCIES_NONE: true

      - name: Compile and Test Build
        run: pnpm build
        env:
          DATABASE_URL: 'postgresql://postgres:123@postgres:5432/postgres'
          DATABASE_DIRECT_URL: 'postgresql://postgres:123@postgres:5432/postgres'
          DEV_MODE: true
          REDIS_HOST: redis
          REDIS_PORT: 6379
          JWT_SECRET: 'change me'
          PORT: 80
          MAX_CHANNELS_PER_SERVER: 100
          MAX_INVITES_PER_SERVER: 10
          MAX_ROLES_PER_SERVER: 50

      # =========================================================
      # NEW: Fix for the Uppercase Username & Docker Push
      # =========================================================
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repository Name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Production Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Using the lowercase name so Docker doesn't reject the tag
          tags: ghcr.io/${{ env.IMAGE_NAME_LOWER }}:latest
